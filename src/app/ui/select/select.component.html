<select
  class="select"
  [attr.id]="id"
  [attr.name]="name"
  [value]="value"
  [required]="required"
  [disabled]="disabled"
  (change)="handleChange($any($event.target).value)"
  (blur)="onBlur()"
>
  <option value="" [disabled]="required">{{ placeholder }}</option>
  @for (option of options; track option.value) {
    <option [value]="option.value">{{ option.label }}</option>
  }
</select>
