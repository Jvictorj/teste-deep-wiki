<button type="button" class="accordion-trigger" (click)="toggle()">
  <span class="trigger-content">
    <ng-content></ng-content>
  </span>
  <svg
    class="chevron"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    [class.open]="isOpen"
  >
    <path d="m6 9 6 6 6-6" />
  </svg>
</button>
