@if (open) {
  <div class="dialog-overlay" (click)="close()"></div>
  <div class="dialog-content">
    <div class="sr-only">
      <h2>{{ title }}</h2>
      <p>{{ description }}</p>
    </div>
    <ng-content></ng-content>
    @if (showCloseButton) {
      <button type="button" class="dialog-close" (click)="close()">?</button>
    }
  </div>
}
