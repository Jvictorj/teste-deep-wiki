<div class="menu-container">
  <mat-toolbar color="primary" class="menu-toolbar">
    <button class="button" *ngIf="onMenu"  mat-icon-button (click)="openNav()"><mat-icon>menu</mat-icon></button>
    <img class="img-desktop" src="assets/imgs/logo-zapfarma/zapfarma-logo-branca.png" alt="Logo ZapFarma" (click)="goHome();">
    <img class="img-mobile" src="assets/imgs/logo-zapfarma/zapfarma-logo-branca.png" alt="Logo ZapFarma" (click)="goHome();">
    <div class="buttons">
      <button  *ngIf="iniciaisLogado ===''" class="acessar" mat-raised-button color="primary">
        <mat-icon>account_circle</mat-icon>
        Acessar
      </button>
      <div *ngIf="iniciaisLogado !==''" class="container-iniciais" [matMenuTriggerFor]="menu">
        <span [matMenuTriggerFor]="menu" title='Logado como: {{usuarioLogado.nome}}'>{{iniciaisLogado}}</span>
      </div>
    </div>
    <mat-menu #menu="matMenu" class="user-menu-panel">
      <button  (click)="goMinhaConta()"  mat-menu-item *ngIf="onMenu && podeGerenciarTudo" >
        <mat-icon>manage_accounts</mat-icon>
        <span>Configurações</span>
      </button>
      <button  (click)="goNovaSenha()" *ngIf="onMenu && podeGerenciarTudo" mat-menu-item>
        <mat-icon>password</mat-icon>
        <span>Alterar senha</span>
      </button>
      <button (click)="onLogOut()" mat-menu-item>
        <mat-icon>logout</mat-icon>
        <span>Sair</span>
      </button>
    </mat-menu>
    <mat-menu #menuNotification="matMenu">
      <button mat-menu-item>
        <mat-icon>notifications</mat-icon>
        <span>Minhas notificações</span>
      </button>
    </mat-menu>

  </mat-toolbar>
</div>

<div *ngIf="onMenu"  #mySidepanel id="mySidepanel" class="sidepanel">
  <div class="sidepanel__header">
    <div class="sidepanel__brand" (click)="goHome(); closeNav()">
      <img src="assets/imgs/logo-zapfarma/zapfarma-logo-branca.png" alt="Logo ZapFarma" />
      <div class="sidepanel__user">
        <span class="sidepanel__user-label">Conectado como</span>
        <strong>{{ primeiroNome || 'Usuário' }}</strong>
      </div>
    </div>
    <button type="button" class="sidepanel__close" aria-label="Fechar menu" (click)="closeNav()">
      <mat-icon>close</mat-icon>
    </button>
  </div>
  <div #divElements class="sidepanel__nav">
    <a class="sidepanel__item-menu" (click)="closeNav()" href="#/dashboard"><mat-icon class="sidepanel__mat-icon-menu">dashboard</mat-icon><span class="item-menu">Início</span></a>
    <a *ngIf="podeAcessarTelaDrogarias" class="sidepanel__item-menu" (click)="closeNav()" href="#/empresas"><mat-icon class="sidepanel__mat-icon-menu">medical_services</mat-icon><span class="item-menu">Drogarias</span></a>
    <a *ngIf="podeAcessarTelaUsuarios" class="sidepanel__item-menu" (click)="closeNav()" href="#/usuarios-afiliados"><mat-icon class="sidepanel__mat-icon-menu">badge</mat-icon><span class="item-menu">Usuários</span></a>
    <a *ngIf="podeGerenciarTudo" class="sidepanel__item-menu" (click)="closeNav()" href="#/treinamentos"><mat-icon class="sidepanel__mat-icon-menu">play_circle</mat-icon><span class="item-menu">Treinamentos</span></a>
    <!-- <a *ngIf="admin || admin_sys" class="sidepanel__item-menu" (click)="closeNav()" mat-list-item href="#/maps"><mat-icon class="sidepanel__mat-icon-menu">maps</mat-icon><span class="item-menu">Mapa</span></a> -->
    <a class="sidepanel__item-menu" (click)="onLogOut()"><mat-icon class="sidepanel__mat-icon-menu">logout</mat-icon><span class="item-menu">Sair</span></a>
  </div>
</div>
