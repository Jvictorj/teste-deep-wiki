<div class="front-zapfarma-esqueceu-senha">
  <div class="front-zapfarma-esqueceu-senha__image-login">
    <img class="logo" src="../../../assets/imgs/logo-zapfarma/zapfarma-logo-branca.png">
  </div>
  <div class="front-zapfarma-esqueceu-senha__login">
    <div class="container">
      <mat-card class="example-card" appearance="outlined">
        <mat-card-content>

          <div *ngIf="!sucesso">
            <div class="container-logo">          
              <img class="logo-mobile" src="../../../assets/imgs/logo-zapfarma/zapfarma-logo.png">
            </div>            
            <div class="container__subtitle">
              <front-zapfarma-header title="Alteração de senha"></front-zapfarma-header>
              <p>Digite a nova senha.</p>
              <p *ngIf="error" class="retorno-erro">{{ error }}</p>
            </div>
            <form [formGroup]="formLogin" novalidate>
              <mat-form-field class="example-full-width">
                <mat-label>Senha</mat-label>
                <input formControlName="senha" type="password" matInput placeholder="Informe nova senha">
                <mat-error *ngIf="formLogin.controls['senha'].hasError('required')">A senha é obrigatória.</mat-error>
                <mat-error *ngIf="formLogin.controls['senha'].hasError('minlength')">A senha deve ter no mínimo 6 caracteres.</mat-error>
              </mat-form-field>
              <!-- <mat-form-field class="example-full-width">
                <mat-label>senha</mat-label>
                <input matInput placeholder="Informe sua senha">
              </mat-form-field> -->

            </form>
          </div>
          <div *ngIf="sucesso" class="retorno-sucesso">
            <h2>Senha alterada com sucesso!</h2>
          </div>
        </mat-card-content>
        <mat-card-actions>
          <button *ngIf="!sucesso" mat-raised-button [disabled]="formLogin.invalid || !_id" (click)="alterarSenha()">Alterar minha senha</button>
          <button mat-stroked-button (click)="voltarLogin()">voltar para Login!</button>
        </mat-card-actions>
      </mat-card>


    </div>

  </div>
</div>
